# ETHUSDT 1h v3 research configuration.
#
# Status: unvalidated. This file intentionally starts near the BTCUSDT 1h
# defaults so ETH can be tested separately without implying BTC rules are final
# for ETH.

version: v3.eth_1h
inherits: configs/v3_default.yaml
asset: ETHUSDT
bar_interval: 1h
status: unvalidated_research_start
validated: false
notes:
  - ETH validation must be evaluated separately from BTC.
  - Do not treat BTCUSDT v2 or v3 results as ETH production evidence.

features:
  ma_short: 24
  ma_long: 168
  ma_long_term: 720
  momentum_short: 24
  momentum_long: 168
  volatility_short: 24
  volatility_long: 168
  drawdown_short: 168
  drawdown_long: 720
  shock_z: 4.0

cooldown:
  cooldown_bars: 120
  tested_values: [120, 144, 168]
  bull_like_regimes: [weak_bull, bull, strong_bull]

position_composer:
  min_position: 0.0
  max_position: 1.0
  allowed_positions: [0.0, 0.25, 0.50, 0.75, 1.0]
  rounding_mode: floor
  allow_leverage: false

execution:
  fee_rate: 0.001
  fee_rate_choices_for_validation: [0.0005, 0.001, 0.002]
  slippage_rate: 0.0
  minimum_position_step: 0.25
  no_trade_zone: 0.25

validation:
  datasets:
    - data/ethusdt_1h_365d.csv
    - data/ethusdt_1h_2y.csv
    - data/ethusdt_1h_3y.csv
    - data/ethusdt_1h_5y.csv
  fee_rate_choices: [0.0005, 0.001, 0.002]
  separate_from_btc: true
